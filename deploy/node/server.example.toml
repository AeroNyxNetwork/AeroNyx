# ============================================
# File: deploy/node/server.example.toml
# ============================================
# Creation Reason:
# - Provide a production-safe, version-controlled configuration template for
#   commercial AeroNyx privacy nodes.
#
# Modification Reason:
# - Document the bounded independent Directory checkpoint witness target. This
#   is corroboration evidence only, not consensus, fork choice, or finality.
# - Add an explicit opt-in ChatRelay blind relay capability block so operators
#   understand why peer quorum remains below route-ready until relay service,
#   public peer API, and self-advertisement are all intentionally enabled.
# - Document discovery peer-store, public peer API, and explicit onion-middle
#   advertisement controls for future no-exit multi-hop relay planning.
# - Document vpn.transports capability metadata for commercial transport
#   readiness. Phase 1 remains UDP-only at the data-plane runtime.
# - Document vpn.dns_proxy_enabled so operators can explicitly choose whether
#   the Rust process or an external host resolver owns gateway_ip:53.
# - Align the default commercial VPN IP pool with the default 1000-session
#   ceiling so new nodes do not start with an IP-pool capacity warning.
# - Initial production node deployment profile. This template separates public
#   defaults from node-private runtime state in /etc/aeronyx.
#
# Main Functionality:
# - Defines VPN listener, virtual IP pool, TUN device, node limits, logging,
#   management heartbeat, and optional MemChain defaults.
#
# Dependencies:
# - Loaded by aeronyx-server via:
#   aeronyx-server start -c /etc/aeronyx/server.toml
# - Installed by deploy/node/install.sh.
# - Validated by deploy/node/healthcheck.sh and aeronyx-server validate.
#
# Main Logical Flow:
# 1. install.sh copies this file to /etc/aeronyx/server.toml if it does not
#    already exist.
# 2. Operators register the node with aeronyx-server register --code <CODE>.
# 3. systemd starts aeronyx-server with the installed config path.
#
# Important Note for Next Developer:
# - Do not put node private keys, registration data, wallet secrets, or user
#   traffic data in this template.
# - Keep this file backward compatible with crates/aeronyx-server/src/config.rs.
# - Existing /etc/aeronyx/server.toml must not be overwritten by install.sh.
#
# Last Modified:
# v1.6.0-node-deploy - Added Directory checkpoint witness threshold guidance.
# v1.5.0-node-deploy - Added explicit ChatRelay capability opt-in defaults.
# v1.4.0-node-deploy - Added discovery peer-store and onion-middle controls.
# v1.3.0-node-deploy - Added VPN transport capability metadata defaults.
# v1.2.0-node-deploy - Added DNS proxy ownership flag.
# v1.1.0-node-deploy - Expanded default VPN pool to /22 for 1000-session
#                      commercial capacity.
# v1.0.0-node-deploy - Added production node example config.
# ============================================

[network]
listen_addr = "0.0.0.0:51820"

[vpn]
virtual_ip_range = "100.64.0.0/22"
gateway_ip = "100.64.0.1"
# true: Rust owns gateway_ip:53 with the built-in privacy-safe UDP DNS proxy.
# false: an external host resolver, such as systemd-resolved, must listen on
# gateway_ip:53. The VPN health endpoint still verifies DNS socket/query status.
dns_proxy_enabled = true

[vpn.transports]
# Phase 1: UDP is the only active Rust VPN data-plane carrier.
udp_enabled = true
# TCP/TLS 443 fallback is planned for UDP-blocked networks. Leave disabled
# until the Rust listener and client fallback implementation are deployed.
tcp_tls_enabled = false
# tcp_tls_public_endpoint = "vpn.example.com:443"
# WebSocket over HTTPS is planned for strict proxy networks. Leave disabled
# until the Rust listener and client fallback implementation are deployed.
websocket_enabled = false
# websocket_public_url = "wss://vpn.example.com/aeronyx/vpn"
preferred_transport = "udp"

[tun]
device_name = "aeronyx0"
mtu = 1420

[server_key]
key_file = "/etc/aeronyx/server_key.json"

[limits]
max_connections = 1000
session_timeout = 86400

[logging]
level = "info"

[management]
cms_url = "https://api.aeronyx.network/api/privacy_network"
heartbeat_interval_secs = 30
session_report_interval_secs = 30
request_timeout_secs = 10
max_retries = 3
node_info_path = "/etc/aeronyx/node_info.json"

[discovery]
# Discovery is the node-to-node control plane for signed peer descriptors.
# It never carries chat plaintext, packet payloads, DNS contents, destinations,
# voucher secrets, wallet traffic, or private keys.
enabled = true
advertise_self = true
peer_cache_path = "/var/lib/aeronyx/peers-cache.json"
# Optional signed local Directory Chain journal. Once configured, startup
# verifies every stored block, chain link, Merkle root, producer, and
# commitment index before the service proceeds. This database contains public
# node descriptor commitments only; never point it at the peer cache or a
# MemChain/chat database.
# directory_chain_path = "/var/lib/aeronyx/directory-chain.db"
# Dedicated bilateral admission for signed Directory Sync tip/block/object
# exchange. Permissionless discovery alone never grants ledger-read access.
# Empty keeps all Directory Sync peer requests fail-closed.
directory_chain_sync_peer_node_ids = []
# Pulls at most one producer block per pinned peer each round. Keep this at 60
# seconds or higher so descriptor-object hydration stays within peer rate limits.
directory_chain_sync_interval_secs = 120
# Number of distinct current Directory Sync pins that must independently
# recompute the same mature local observation checkpoint. Valid range: 1-16,
# and it cannot exceed directory_chain_sync_peer_node_ids. Existing nodes keep
# one-receipt behavior. Use 2 or more only after compatible pins are deployed.
# This is corroboration evidence; it is not a vote, consensus, or finality.
directory_observation_witness_min_verified = 1
peer_cache_write_interval_secs = 120
# Optional external rollback witness for the signed verified-delivery cache.
# Each pin is a 32-byte node Ed25519 identity in hexadecimal. Witnesses retain
# only this node id, a monotonic generation, an opaque digest, and observation
# time; no delivery count/time, route, message id, payload, endpoint, or client
# metadata is sent. Keep disabled until the pinned nodes run the compatible
# peer API and this node uses a local [memchain] storage mode.
verified_delivery_witness_node_ids = []
verified_delivery_witness_min_verified = 1
verified_delivery_witness_required_for_restore = false
# Witness-side admission is bilateral and independent of permissionless peer
# discovery. List only requester node identities this node explicitly agrees
# to protect. Empty means the witness endpoint refuses every write.
verified_delivery_witness_requester_node_ids = []
gossip_enabled = true
gossip_interval_secs = 45
gossip_peer_limit = 8
gossip_jitter_percent = 15
gossip_backpressure_failure_threshold = 4
gossip_failure_backoff_max_secs = 180
max_peers = 512
max_snapshot_limit = 64
gossip_rate_limit_per_minute = 30
# Set this to the public HTTP(S) endpoint that reaches public_api_listen_addr.
# ChatRelay and OnionMiddle capabilities are not advertised unless this is set,
# which prevents stale or UDP-only VPN endpoints from polluting peer routing.
# public_endpoint = "https://node.example.com"
public_api_listen_addr = "0.0.0.0:8422"
region = "unknown"
descriptor_ttl_secs = 7200
public_discovery = false
# No-exit onion middle-hop capability is opt-in. Leave disabled until the
# operator explicitly wants this node to participate in multi-hop relay paths.
advertise_onion_middle = false

# Commercial VPN nodes should start with MemChain disabled unless the operator
# explicitly wants local memory-chain services on the same machine.
[memchain]
mode = "off"
api_listen_addr = "127.0.0.1:8421"
db_path = "/var/lib/aeronyx/memchain.db"
aof_path = "/var/lib/aeronyx/.memchain"
miner_interval_secs = 60
# Set to false on protocol-only relay nodes that do not install local ONNX
# embedding models. This keeps encrypted storage, public discovery, and
# ChatRelay routes available without noisy model-missing warnings.
embed_enabled = true

# Cross-host duplicate-coordinator fencing is intentionally default-off.
# Before enabling it, upgrade every identity in commitment_witness_node_ids,
# require strict startup witness evidence, and verify that all pins can grant
# the same audited chain tip. This lease is an operational safety control, not
# consensus, leader election, finality, or fork choice.
commitment_coordinator_lease_required = false
commitment_coordinator_lease_ttl_secs = 120

# ChatRelay is a blind store-and-forward relay for E2E-encrypted chat and
# media envelopes. It is intentionally disabled by default. To advertise this
# node as a routeable ChatRelay peer, all three conditions must be true:
# 1. [memchain.chat_relay].enabled = true
# 2. [discovery].public_endpoint points to this node's public peer API
# 3. [discovery].public_api_listen_addr is reachable by peers
#
# The relay stores only ciphertext blobs and metadata needed for delivery; it
# must never inspect chat plaintext, message content, DNS contents, client
# public IPs, destinations, browsing history, wallet-level traffic, or private
# keys.
[memchain.chat_relay]
enabled = false
offline_ttl_secs = 259200
max_pending_per_wallet = 500
# Node-wide ceilings prevent synthetic receiver identities from bypassing the
# per-wallet mailbox quota. Existing configs may omit these fields and use the
# backward-compatible defaults shown here.
max_pending_messages_total = 100000
max_pending_message_bytes_total = 536870912
db_path = "/var/lib/aeronyx/chat_pending.db"
max_message_size = 65536
max_blob_size = 10485760
max_blobs_per_receiver = 50
max_pending_blobs_total = 5000
max_pending_blob_bytes_total = 2147483648
cleanup_interval_secs = 60
dedup_lru_capacity = 10000
expired_notification_ttl_secs = 604800
